<!DOCTYPE html>

</head>
<body>

</div>

</div>




        <button onclick="showData()"> Scout Players</button>
    </div>

    <div id="results" style="display: none;">Select filters above...</div>

    <script>

async function showData() {
    const team = document.getElementById("teamSelect").value;
    const position = document.getElementById("positionSelect").value;
    const metrics = Array.from(document.querySelectorAll('input[type="checkbox"]:checked'))
        .map(cb => cb.value);
    
    console.log("Filtering:", {team, position, metrics});
    
    document.getElementById("results").innerHTML = "Loading...";
    document.getElementById("results").style.display = "block";
    
    try {
        const res = await fetch("/api/players", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({team, position, metrics: metrics}) 
        });
        
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        console.log("Data received:", data.players.slice(0,2)); 
        displayResults(data.players, metrics);
    } catch(e) {
        document.getElementById("results").innerHTML = `<p class="error">Error: ${e}</p>`;
    }
}


   function displayResults(players, metrics) {
    if (!players?.length) {
        document.getElementById("results").innerHTML = "<p class='error'>No players found</p>";
        return;
    }
    
    const excludeColumns = ['Player', 'player', 'team'];
    const displayMetrics = metrics.filter(metric => !excludeColumns.includes(metric));
    
    let headers = `<tr><th>Player</th><th>Team</th><th>Pos</th>`;
    const labels = {
        'BA': 'AVG', 'WAR': 'WAR', 'HR': 'HR', 'RBI': 'RBI', 'OPS': 'OPS', 'rOBA': 'rOBA',
        'Age': 'Age', 'G': 'G', 'PA': 'PA', 'AB': 'AB', 'R': 'R', 'H': 'H',
        '2B': '2B', '3B': '3B', 'dominant_hand': 'Hand', 'Pos': 'Pos'
    };
    
    displayMetrics.forEach(metric => {
        headers += `<th>${labels[metric] || metric}</th>`;
    });
    headers += "</tr>";
    
    let rows = "";
    players.slice(0, 100).forEach(p => {
        const playerName = p.Player || p.player || 'Unknown';
        const teamName = (p.team || 'Unknown').charAt(0).toUpperCase() + (p.team || 'Unknown').slice(1);
        const pos = p.Pos || p.pos || 'Unknown';
        const hand = p.dominant_hand || 'N/A';  
        
        rows += `<tr>
            <td class="player-name" onclick="fetchPlayer('${playerName}', '${teamName}')" title="Click for full stats">
                ${playerName}
            </td>
            <td>${teamName}</td>
            <td>${pos}</td>`;
        
        displayMetrics.forEach(metric => {
            let value = p[metric];
            let displayValue;
            
            if (metric === 'dominant_hand') {
                displayValue = value || 'N/A';
            } else if (value != null && !isNaN(value)) {
                displayValue = (['BA','OBP','SLG','OPS','rOBA'].includes(metric)) ? 
                    Number(value).toFixed(3) : Number(value).toFixed(0);
            } else {
                displayValue = value || '-';
            }
            
            rows += `<td style="text-align: ${metric === 'dominant_hand' ? 'left' : 'right'};">${displayValue}</td>`;
        });
        rows += "</tr>";
    });
    
    document.getElementById("results").innerHTML = 
        `<h3> ${players.length} players </h3>
         <table>${headers}${rows}</table>`;
}
    
    </script>
</body>
</html>
